name: KTX Auto Macro

on:
  workflow_dispatch: # 수동 실행 버튼 활성화
  repository_dispatch: # 외부 웹 크론 서비스에서 신호를 받아 실행할 수 있도록 설정

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install korail2 requests

      - name: 매크로 실행
        env:
          KID: ${{ secrets.KID }}
          KPW: ${{ secrets.KPW }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py
