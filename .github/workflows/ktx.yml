name: KTX Auto Macro

on:
  workflow_dispatch: # GitHub 웹사이트에서 버튼을 눌러 언제든 수동 실행 가능
  schedule:
    - cron: '*/1 * * * *' # 1분마다 자동으로 반복 실행

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install korail2 requests

      - name: 매크로 실행
        env:
          KID: ${{ secrets.KID }}
          KPW: ${{ secrets.KPW }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py
