name: KTX Auto Macro (Selenium)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-ktx]

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 크롬 브라우저 및 드라이버 설치
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: 필수 라이브러리 설치
        run: |
          pip install selenium webdriver-manager requests

      - name: 매크로 실행
        env:
          KID: ${{ secrets.KID }}
          KPW: ${{ secrets.KPW }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py
