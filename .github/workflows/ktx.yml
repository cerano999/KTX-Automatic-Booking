name: KTX Auto Macro

on:
  workflow_dispatch: # 수동 실행 버튼 활성화
  schedule:
    - cron: '*/1 * * * *' # 1분마다 자동 실행 (테스트를 위해 1분으로 설정)

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install korail2 requests

      - name: 매크로 실행
        env:
          KID: ${{ secrets.KID }}
          KPW: ${{ secrets.KPW }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py
